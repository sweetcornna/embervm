name: e2e-m3

# M3 exit-criteria gate (docs/zh/03 §3): 冷归档恢复 < 10s 可交互; 归档成本达标.
# Full-stack: REST control plane + lifecycle engine (TTL tier flow) + ZFS +
# warm/cold MinIO buckets + PostgreSQL. Latencies are CI-relative per
# docs/adr/0001.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  exit-criteria:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FC_VERSION: v1.16.1
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: embervm
          POSTGRES_PASSWORD: embervm
          POSTGRES_DB: embervm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo udevadm settle || true
          for _ in $(seq 1 30); do test -w /dev/kvm && break; sleep 1; done
          test -w /dev/kvm

      - name: Enable unprivileged userfaultfd
        run: sudo sysctl -w vm.unprivileged_userfaultfd=1

      - name: Install dependencies (zfs userland is NOT preinstalled)
        run: sudo apt-get update && sudo apt-get install -y jq e2fsprogs zfsutils-linux

      - name: Free runner disk space
        run: bash scripts/ci-free-disk.sh

      - name: Create loopback ZFS pool
        run: |
          truncate -s 12G /var/tmp/embervm-m3.img
          sudo zpool create -f embervm-m3 /var/tmp/embervm-m3.img
          sudo zfs list embervm-m3

      - name: Start MinIO (warm L1 + cold L2 buckets)
        run: |
          curl -fsSL -o /tmp/minio https://dl.min.io/server/minio/release/linux-amd64/minio
          sudo install -m 0755 /tmp/minio /usr/local/bin/minio
          curl -fsSL -o /tmp/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          sudo install -m 0755 /tmp/mc /usr/local/bin/mc
          mkdir -p /tmp/minio-data
          MINIO_ROOT_USER=embervm-ci MINIO_ROOT_PASSWORD=embervm-ci-secret \
            nohup minio server /tmp/minio-data --address 127.0.0.1:9000 >/tmp/minio.log 2>&1 &
          for _ in $(seq 1 30); do curl -sf http://127.0.0.1:9000/minio/health/live && break; sleep 1; done
          curl -sf http://127.0.0.1:9000/minio/health/live
          mc alias set l1 http://127.0.0.1:9000 embervm-ci embervm-ci-secret
          mc mb l1/embervm-warm
          mc mb l1/embervm-cold

      - name: Cache assets
        uses: actions/cache@v4
        with:
          path: assets
          key: assets-v1.16.1-${{ hashFiles('scripts/assets.sha256') }}

      - name: Build host binaries
        run: make build

      - name: Fetch assets
        run: sudo -E env "PATH=$PATH" FC_VERSION=v1.16.1 bash scripts/fetch-assets.sh

      - name: Portable gates (synthetic full + prewarm policy)
        run: |
          set -o pipefail
          go test ./pkg/memsnap/ -run 'TestSynthesize' -v -count=1 | tee /tmp/m3-unit.log
          go test ./pkg/prewarm/ -v -count=1 | tee -a /tmp/m3-unit.log
          for t in TestSynthesizeFlattensChain TestSynthesizeReconstruction \
                   TestPredictNextRegularPattern TestPredictNextNoisyPattern TestShouldPrewarmWindow; do
            grep -q -- "--- PASS: $t" /tmp/m3-unit.log \
              || { echo "::error::$t did not PASS (skipped?)"; exit 1; }
          done

      - name: Run M3 lifecycle exit gate (TTL flow; cold restore <10s; recycle + selective restore)
        env:
          # Absolute paths (M1 lesson: relative paths silently SKIP env-gated
          # tests — a false green).
          EMBERVM_KVM_TESTS: "1"
          EMBERVM_KERNEL: ${{ github.workspace }}/assets/vmlinux-6.1.155
          EMBERVM_FC_BIN: ${{ github.workspace }}/assets/release-v1.16.1-x86_64/firecracker-v1.16.1-x86_64
          EMBERVM_UFFD_BIN: ${{ github.workspace }}/bin/uffd-handler
          EMBERVM_GUESTD_BIN: ${{ github.workspace }}/bin/guestd
          EMBERVM_SCRIPT_DIR: ${{ github.workspace }}/scripts
          EMBERVM_ZFS_POOL: embervm-m3
          EMBERVM_L1_ENDPOINT: 127.0.0.1:9000
          EMBERVM_L1_BUCKET: embervm-warm
          EMBERVM_L1_ACCESS_KEY: embervm-ci
          EMBERVM_L1_SECRET_KEY: embervm-ci-secret
          EMBERVM_COLD_ENDPOINT: 127.0.0.1:9000
          EMBERVM_COLD_BUCKET: embervm-cold
          EMBERVM_COLD_ACCESS_KEY: embervm-ci
          EMBERVM_COLD_SECRET_KEY: embervm-ci-secret
          EMBERVM_PG_TESTS: "1"
          EMBERVM_TEST_DATABASE_URL: postgres://embervm:embervm@localhost:5432/embervm?sslmode=disable
        run: |
          set -o pipefail
          sudo -E env "PATH=$PATH" \
            go test ./pkg/nodeagent/ -run 'TestLifecycleTTLFlow' -v -count=1 -timeout 30m \
            | tee /tmp/m3-exit.log
          grep -q -- '--- PASS: TestLifecycleTTLFlow' /tmp/m3-exit.log \
            || { echo "::error::TestLifecycleTTLFlow did not PASS (skipped?)"; exit 1; }

      - name: Report measured numbers
        if: always()
        run: |
          grep -E "cold-archive restore|archive cost report|selective restore|demoted|archived|recycled" /tmp/m3-exit.log || true

      - name: Upload logs on failure
        if: failure()
        run: sudo chmod -R a+rX /tmp 2>/dev/null || true
