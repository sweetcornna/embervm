name: lint-unit

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Template build from registry (network + mkfs.ext4, no KVM)
        run: |
          sudo apt-get install -y e2fsprogs
          EMBERVM_NET_TESTS=1 go test ./pkg/template/ -run 'TestBuildFromRegistry|TestBuildFromTar|TestMkext4' -v

  controlplane-pg:
    # Control-plane store + REST handlers against a real PostgreSQL.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: embervm
          POSTGRES_PASSWORD: embervm
          POSTGRES_DB: embervm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Control-plane tests against PostgreSQL
        env:
          EMBERVM_PG_TESTS: "1"
          EMBERVM_TEST_DATABASE_URL: postgres://embervm:embervm@localhost:5432/embervm?sslmode=disable
        run: go test ./pkg/controlplane/ -v -count=1

  storage-zfs:
    # Real-ZFS clone/snapshot check on a throwaway loop-file pool. The zfs
    # kernel module ships in the ubuntu-latest kernel but zfsutils-linux does
    # not (M0 lesson); non-blocking because a runner without either must not
    # gate the build.
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install zfs userland
        run: sudo apt-get update && sudo apt-get install -y zfsutils-linux

      - name: Load zfs module
        run: sudo modprobe zfs

      - name: Real-ZFS integration test
        run: sudo -E env "PATH=$PATH" EMBERVM_ZFS_TESTS=1 go test ./pkg/storage/ -run TestZFSIntegration -v
