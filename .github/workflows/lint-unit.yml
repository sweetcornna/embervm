name: lint-unit

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Unit tests
        run: make test

      - name: Template build from registry (network + mkfs.ext4, no KVM)
        run: |
          sudo apt-get install -y e2fsprogs
          EMBERVM_NET_TESTS=1 go test ./pkg/template/ -run 'TestBuildFromRegistry|TestBuildFromTar|TestMkext4' -v
