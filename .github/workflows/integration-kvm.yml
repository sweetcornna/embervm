name: integration-kvm

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        fc_version: ["v1.16.1", "v1.15.1"]
    concurrency:
      group: integration-kvm-${{ github.ref }}-${{ matrix.fc_version }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable KVM for the runner user
        # The udev trigger is asynchronous; occasionally /dev/kvm is not yet
        # writable when the next line runs. Bounded wait instead of one-shot.
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo udevadm settle || true
          for _ in $(seq 1 30); do test -w /dev/kvm && break; sleep 1; done
          test -w /dev/kvm

      - name: Enable unprivileged userfaultfd
        run: sudo sysctl -w vm.unprivileged_userfaultfd=1

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools jq

      - name: Cache assets
        uses: actions/cache@v4
        with:
          path: assets
          key: assets-${{ matrix.fc_version }}-${{ hashFiles('scripts/assets.sha256') }}

      - name: Build host binaries
        run: make build

      - name: Run smoke test
        run: sudo -E env "PATH=$PATH" FC_VERSION=${{ matrix.fc_version }} bash test/integration/smoke.sh

      - name: Make VM logs readable for artifact upload
        if: failure()
        # The jailer chroot under work/jail is uid 123 / mode 0700; the
        # artifact uploader runs as the runner user and needs traverse+read.
        run: sudo chmod -R a+rX work 2>/dev/null || true

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-${{ matrix.fc_version }}
          path: |
            work/**/*.log
          if-no-files-found: ignore

  nodeagent-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        fc_version: ["v1.16.1", "v1.15.1"]
    concurrency:
      group: nodeagent-smoke-${{ github.ref }}-${{ matrix.fc_version }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo udevadm settle || true
          for _ in $(seq 1 30); do test -w /dev/kvm && break; sleep 1; done
          test -w /dev/kvm

      - name: Enable unprivileged userfaultfd
        run: sudo sysctl -w vm.unprivileged_userfaultfd=1

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools jq e2fsprogs

      - name: Cache assets
        uses: actions/cache@v4
        with:
          path: assets
          key: assets-${{ matrix.fc_version }}-${{ hashFiles('scripts/assets.sha256') }}

      - name: Run node agent smoke test
        run: sudo -E env "PATH=$PATH" FC_VERSION=${{ matrix.fc_version }} bash test/integration/nodeagent-smoke.sh

      - name: Collect VM logs for artifact upload
        # The upload-artifact glob walks all of /tmp and dies with EACCES on
        # root-owned dirs (snap-private-tmp), so gather the logs ourselves.
        if: failure()
        run: |
          mkdir -p vm-logs
          sudo find /tmp -type f \( -name 'fc*.log' -o -name 'uffd*.log' \) \
            -exec cp --parents {} vm-logs/ \; 2>/dev/null || true
          sudo chmod -R a+rX vm-logs work 2>/dev/null || true

      - name: Upload VM logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nodeagent-logs-${{ matrix.fc_version }}
          path: vm-logs/
          if-no-files-found: ignore

  dev-smoke:
    # Full public REST lifecycle through `embervm dev` (single process +
    # in-proc node agent) against a real PostgreSQL and a real microVM.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: embervm
          POSTGRES_PASSWORD: embervm
          POSTGRES_DB: embervm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo udevadm settle || true
          for _ in $(seq 1 30); do test -w /dev/kvm && break; sleep 1; done
          test -w /dev/kvm

      - name: Enable unprivileged userfaultfd
        run: sudo sysctl -w vm.unprivileged_userfaultfd=1

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq e2fsprogs

      - name: Cache assets
        uses: actions/cache@v4
        with:
          path: assets
          key: assets-v1.16.1-${{ hashFiles('scripts/assets.sha256') }}

      - name: Run dev-mode REST smoke
        env:
          EMBERVM_DATABASE_URL: postgres://embervm:embervm@localhost:5432/embervm?sslmode=disable
        run: sudo -E env "PATH=$PATH" FC_VERSION=v1.16.1 bash test/integration/dev-smoke.sh
