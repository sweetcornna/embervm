name: bench

on:
  workflow_dispatch:
    inputs:
      iters:
        description: "Iterations per benchmark cell"
        required: false
        default: "15"
      dirty_mb:
        description: "Guest dirty memory in MiB (ember.dirty_mb)"
        required: false
        default: "256"
  schedule:
    - cron: '17 3 * * 1'

jobs:
  restore-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          test -w /dev/kvm

      - name: Enable unprivileged userfaultfd
        run: sudo sysctl -w vm.unprivileged_userfaultfd=1

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools jq

      - name: Free runner disk space
        run: bash scripts/ci-free-disk.sh

      - name: Cache assets
        uses: actions/cache@v4
        with:
          path: assets
          key: assets-v1.16.1-${{ hashFiles('scripts/assets.sha256') }}

      - name: Build host binaries
        run: make build

      - name: Fetch assets
        run: sudo -E env "PATH=$PATH" FC_VERSION=v1.16.1 bash scripts/fetch-assets.sh

      - name: Build guest rootfs
        run: sudo -E env "PATH=$PATH" FC_VERSION=v1.16.1 bash scripts/build-rootfs.sh

      - name: Run restore matrix
        env:
          ITERS: ${{ inputs.iters || '15' }}
          DIRTY_MB: ${{ inputs.dirty_mb || '256' }}
        run: sudo -E env "PATH=$PATH" FC_VERSION=v1.16.1 bash test/bench/restore-matrix.sh --iters "$ITERS" --dirty-mb "$DIRTY_MB"

      - name: Run UFFDIO_COPY microbenchmark
        run: sudo -E env "PATH=$PATH" bin/uffdiocopy --out results/uffdio-copy.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-restore
          path: results/

  zfs:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Run ZFS clone comparison
        run: sudo -E bash test/bench/zfs-compare.sh --out results/zfs-compare.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-zfs
          path: results/
          if-no-files-found: ignore

  report:
    runs-on: ubuntu-latest
    needs: [restore-bench, zfs]
    if: always() && needs.restore-bench.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          merge-multiple: true
          path: results

      - name: Generate report
        run: go run ./test/bench/report --results-dir results --out results/REPORT.md

      - name: Publish report to step summary
        run: cat results/REPORT.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: baseline-report
          path: results/REPORT.md
